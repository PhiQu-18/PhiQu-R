<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Test | PhiQu-R</title>
    <link rel="icon" type="image/png" href="./foto/1.2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .option-card:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; transform: translateX(10px); }
        .option-card.correct { background: #059669 !important; border-color: #10b981 !important; animation: pulse 0.5s; }
        .option-card.wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        .CodeMirror { height: 220px; border-radius: 1rem; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-6xl mt-4 mb-8">
        <div class="flex justify-between items-end mb-4">
            <div>
                <span class="px-3 py-1 bg-blue-600 rounded-full text-[10px] font-bold uppercase tracking-widest animate-pulse">Final Assessment</span>
                <h1 class="text-3xl font-black mt-2">Post-Test <span class="text-blue-500">PhiQu-R</span></h1>
                <p id="problem-title" class="text-blue-400 text-sm font-bold mt-1 uppercase tracking-tighter italic">Memuat Masalah...</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Progress</p>
                <span id="q-count" class="text-3xl font-black text-blue-500">1/20</span>
            </div>
        </div>
        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-white/5">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-700" style="width: 5%"></div>
        </div>
    </div>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="glass rounded-[2.5rem] overflow-hidden p-3 group">
                <img id="q-image" src="" class="w-full h-72 object-cover rounded-[2rem] transition duration-500 group-hover:scale-105" alt="Visual Fisika">
            </div>

            <div class="glass rounded-[2.5rem] p-7 relative">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-xs flex items-center gap-2 text-blue-300 tracking-widest uppercase">
                        <i class="fas fa-terminal animate-pulse"></i> CT Simulation Lab
                    </h3>
                    <button onclick="runCode()" class="bg-blue-600 hover:bg-blue-700 text-white text-[10px] px-4 py-2 rounded-xl font-black transition-all hover:shadow-[0_0_15px_rgba(37,99,235,0.5)] active:scale-95 uppercase">
                        Run Logic <i class="fas fa-play ml-1"></i>
                    </button>
                </div>
                <textarea id="code-editor"></textarea>
                <div id="console-output" class="mt-4 p-4 bg-black/60 rounded-xl text-[13px] font-mono text-cyan-400 border border-white/5 min-h-[50px] shadow-inner">

                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="glass rounded-[2.5rem] p-8 md:p-12 h-full flex flex-col shadow-2xl">
                <div id="pilar-badge" class="self-start px-5 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-400 text-[10px] font-black uppercase mb-6 tracking-widest">
                    Dekomposisi
                </div>
                <h2 id="q-text" class="text-xl md:text-2xl font-bold leading-relaxed mb-10 text-slate-100">
                    Memuat pertanyaan...
                </h2>

                <div id="options" class="grid gap-4 mt-auto">
                    </div>
            </div>
        </div>
    </main>

                pilar: "Dekomposisi",

        window.onload = () => {
            editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
                mode: "javascript",
                theme: "dracula",
                lineNumbers: true,
                autoCloseBrackets: true
            });
            
            let attempts = parseInt(localStorage.getItem('phiQu_post_attempts')) || 0;
            attempts++;
            localStorage.setItem('phiQu_post_attempts', attempts);

            loadQuestion();
        };

        function loadQuestion() {
            const q = questions[currentIdx];
            
            // UI Updates
            document.getElementById('q-text').innerHTML = q.text;
            document.getElementById('q-image').src = q.image;
            document.getElementById('pilar-badge').innerText = q.pilar;
            document.getElementById('problem-title').innerText = q.masalah;
            document.getElementById('q-count').innerText = `${currentIdx + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx+1)/questions.length)*100}%`;

            // Logic Ganti Editor setiap 4 soal (awal masalah baru)
            if (currentIdx % 4 === 0) {
                editor.setValue(q.code);
            }

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = "option-card glass p-5 rounded-2xl flex items-center gap-4 animate__animated animate__fadeInRight";
                btn.style.animationDelay = `${i * 0.1}s`;
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-blue-600/20 text-blue-400 flex items-center justify-center font-bold text-xs border border-blue-500/30">
                        ${String.fromCharCode(65+i)}
                    </div>

                    ${
                        typeof opt === "string"
                        ? `<span class="text-sm font-semibold tracking-tight">${opt}</span>`
                        : `<img src="${opt.img}" class="w-full h-24 object-contain rounded-lg border border-white/10">`
                    }
                `;
                btn.onclick = () => checkAnswer(i);
                optionsDiv.appendChild(btn);
            });
        }

        function runCode() {
            const outputDiv = document.getElementById('console-output');
            outputDiv.innerHTML = "> Running...";
            try {
                const code = editor.getValue();
                const originalLog = console.log;
                console.log = (msg) => { outputDiv.innerHTML = `> Result: ${msg}`; };
                eval(code);
                console.log = originalLog;
            } catch (err) {
                outputDiv.innerHTML = `<span class="text-red-400">> Error: ${err.message}</span>`;
            }
        }

        function checkAnswer(choice) {
            const q = questions[currentIdx];
            const allCards = document.querySelectorAll('.option-card');
            allCards.forEach(c => c.style.pointerEvents = 'none');

            if(choice === q.correct) {
                allCards[choice].classList.add('correct');
                report[q.pilar.toLowerCase()]++;
                report.total_score += 5;
            } else {
                allCards[choice].classList.add('wrong');
                allCards[q.correct].classList.add('correct');
            }

            setTimeout(() => {
                if(currentIdx < questions.length - 1) {
                    currentIdx++;
                    loadQuestion();
                } else {
                    submitPostTest();
                }
            }, 1200);
        }

        async function submitPostTest() {
    Swal.fire({ 
        title: 'Menyimpan Hasil...', 
        allowOutsideClick: false, 
        didOpen: () => Swal.showLoading() 
    });

    const user = JSON.parse(localStorage.getItem('userPhiQu'));
    const payload = {
        action: 'submit_posttest',
        username: user ? user.username : 'Guest',
        nilai_fisika: report.total_score,
        dekomposisi: Math.round((report.dekomposisi/5)*100),
        pola: Math.round((report.pola/5)*100),
        abstraksi: Math.round((report.abstraksi/5)*100),
        algoritma: Math.round((report.algoritma/5)*100),
        percobaan: localStorage.getItem('phiQu_post_attempts')
    };

    try {
        // Proses simpan data ke Google Sheets
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        
        // POP-UP ANGKET SETELAH BERHASIL SIMPAN
        Swal.fire({
            icon: 'success',
            title: 'Evaluasi Selesai!',
            text: 'Data nilaimu telah tersimpan. Mohon bantu kami dengan memberikan penilaian tentang media ini.',
            showCancelButton: true,
            confirmButtonText: 'Oke, Isi Angket',
            cancelButtonText: 'Tidak Dulu',
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#64748b',
            reverseButtons: true, // Menempatkan tombol Oke di kanan
            allowOutsideClick: false
        }).then((result) => {
            if (result.isConfirmed) {
                // Ke halaman angket
                window.location.href = "angket.html";
            } else {
                // Ke profil
                window.location.href = "profil.html";
            }
        });

    } catch (e) {
        // Jika terjadi error koneksi, tetap tawarkan angket atau lempar ke profil
        console.error("Error submitting data:", e);
        window.location.href = "profil.html";
    }
}
    </script>
</body>
</html>
