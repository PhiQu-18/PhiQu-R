    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwv799_EYwLRsr_C3FClkR_RMUoaA5oE_cGQMhuEo80C-1OSklxve4Am2KN2Iv4viYB/exec";
        let localUser = JSON.parse(localStorage.getItem('userPhiQu'));

        window.onload = async () => {
            if (!localUser) { window.location.href = "index.html"; return; }
            updateUI(localUser);
            
            // Cek kelengkapan profil
            if (!localUser.sekolah || !localUser.hp || !localUser.foto_url) {
                document.getElementById('main-profile').classList.add('blur-xl', 'pointer-events-none');
                forceCompleteProfile();
            } else {
                fetchLatestData();
            }
        };

        async function fetchLatestData() {
    try {
        // Tambahkan timestamp agar tidak terkena cache browser
        const res = await fetch(`${API_URL}?action=get_data&username=${localUser.username}&t=${new Date().getTime()}`);
        const db = await res.json();
        
        if (db.status === "success" && db.data) {
            // Gabungkan data lama dan baru agar tidak ada info yang hilang
            const updatedData = { ...localUser, ...db.data };
            localStorage.setItem('userPhiQu', JSON.stringify(updatedData));
            localUser = updatedData;
            
            // Refresh UI dengan data terbaru
            updateUI(updatedData);
            
            // Lepas blur jika data sudah lengkap
            if (updatedData.sekolah && updatedData.hp && updatedData.foto_url) {
                document.getElementById('main-profile').classList.remove('blur-xl', 'pointer-events-none');
            }
        }
    } catch (e) { 
        console.error("Gagal mengambil data terbaru:", e);
        Swal.fire({
            icon: 'warning',
            title: 'Koneksi Lemah',
            text: 'Menampilkan data terakhir yang tersimpan di perangkat.'
        });
    }
}

function updateUI(data) {
    if (!data) return;

    // Identitas Dasar
    document.getElementById('user-name').innerText = data.nama || "User";
    document.getElementById('user-school').innerText = data.sekolah || "Belum Diatur";
    document.getElementById('user-hp').innerText = data.hp || "-";
    
    const avatarFallback = `https://ui-avatars.com/api/?name=${data.nama}&background=2563eb&color=fff`;
    document.getElementById('user-avatar').src = data.foto_url && data.foto_url.startsWith('data:image') ? data.foto_url : avatarFallback;
    
    // Ambil data dengan fallback (mengantisipasi snake_case atau camelCase)
    const scorePre = parseInt(data.score_pre || 0);
    const scorePost = parseInt(data.score_post || 0);
    const attPre = data.attempt_pre || 0;
    const attPost = data.attempt_post || 0;

    document.getElementById('score-pre').innerText = scorePre;
    document.getElementById('score-post').innerText = scorePost;
    document.getElementById('att-pre').innerText = attPre + " Kali";
    document.getElementById('att-post').innerText = attPost + " Kali";
    
    const avg = scorePost > 0 ? ((scorePre + scorePost) / 2).toFixed(0) : scorePre;
    document.getElementById('avg-fisika').innerText = avg;
    
    // Mapping Pilar CT
    // data.ct_post biasanya datang dalam bentuk Array dari Apps Script update kita
    const ctData = Array.isArray(data.ct_post) ? data.ct_post : [0,0,0,0];
    const labels = ['Dekomposisi', 'Pola', 'Abstraksi', 'Algoritma'];
    const maxVal = Math.max(...ctData);
    const idx = ctData.indexOf(maxVal);
    document.getElementById('strongest-ct').innerText = maxVal > 0 ? labels[idx] : "Belum Tes";

    // Panggil fungsi render dengan data yang sudah diproses
    renderCharts(data, ctData); 
    renderTable(data);
}

function renderCharts(data, ctPostData) {
    ['lineChart', 'radarChart'].forEach(id => {
        const chart = Chart.getChart(id);
        if (chart) chart.destroy();
    });

    // Line Chart
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: ['Mulai', 'Pre-Test', 'Post-Test'],
            datasets: [{
                label: 'Nilai Fisika',
                // SESUAIKAN DISINI
                data: [0, data.score_pre || 0, data.score_post || 0], 
                borderColor: '#2563eb', 
                backgroundColor: 'rgba(37, 99, 235, 0.05)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { 
            maintainAspectRatio: false,
            scales: { y: { min: 0, max: 100 } }
        }
    });

    // Radar Chart
    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['Dekomposisi', 'Pola', 'Abstraksi', 'Algoritma'],
            datasets: [
                { 
                    label: 'Pre', 
                    data: data.ct_pre || [0,0,0,0], 
                    borderColor: '#94a3b8', 
                    backgroundColor: 'transparent' 
                },
                { 
                    label: 'Post', 
                    data: ctPostData || [0,0,0,0], 
                    borderColor: '#2563eb', 
                    backgroundColor: 'rgba(37, 99, 235, 0.1)' 
                }
            ]
        },
        options: { 
            maintainAspectRatio: false,
            scales: { r: { min: 0, max: 100, ticks: { display: false } } }
        }
    });
}

            // Radar Chart - Pilar CT
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['Dekomposisi', 'Pola', 'Abstraksi', 'Algoritma'],
                    datasets: [
                        { label: 'Pre', data: data.ctPre || [0,0,0,0], borderColor: '#94a3b8', backgroundColor: 'transparent' },
                        { label: 'Post', data: data.ctPost || [0,0,0,0], borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)' }
                    ]
                },
                options: { 
                    maintainAspectRatio: false, 
                    scales: { 
                        r: { 
                            min: 0, 
                            max: 100,
                            ticks: { display: false } 
                        } 
                    } 
                }
            });

        function renderTable(data) {
    const tbody = document.getElementById('table-body');
    const sessions = [
        { 
            name: 'Pre-Test', 
            score: data.score_pre || 0, 
            attempt: data.attempt_pre || 0,
            ct: data.ct_pre || [0,0,0,0] 
        },
        { 
            name: 'Post-Test', 
            score: data.score_post || 0, 
            attempt: data.attempt_post || 0,
            ct: data.ct_post || [0,0,0,0] 
        }
    ];

    tbody.innerHTML = sessions.map(s => `
        <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4">
                <div class="text-slate-800 font-bold">${s.name}</div>
                <div class="text-[10px] text-slate-400 uppercase font-black">Percobaan: ${s.attempt}x</div>
            </td>
            <td class="px-6 py-4 text-blue-600 font-black text-lg">${s.score}</td>
            <td class="px-6 py-4">${s.ct[0] || 0}</td>
            <td class="px-6 py-4">${s.ct[1] || 0}</td>
            <td class="px-6 py-4">${s.ct[2] || 0}</td>
            <td class="px-6 py-4">${s.ct[3] || 0}</td>
        </tr>
    `).join('');
}

        async function forceCompleteProfile() {
            Swal.fire({
                title: 'Lengkapi Profil',
                html: `
                    <div class="text-left space-y-4">
                        <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                            <img id="preview-foto" src="https://ui-avatars.com/api/?name=${localUser.nama}">
                            <input type="file" id="file-input" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('file-input').click()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Pilih Foto</button>
                        </div>
                        <input id="inp-sekolah" class="swal-field" placeholder="Nama Sekolah" value="${localUser.sekolah || ''}">
                        <input id="inp-hp" type="number" class="swal-field" placeholder="No. WhatsApp" value="${localUser.hp || ''}">
                    </div>
                `,
                confirmButtonText: 'Simpan Profil',
                allowOutsideClick: false,
                didOpen: () => {
                    const input = document.getElementById('file-input');
                    const preview = document.getElementById('preview-foto');
                    input.onchange = (e) => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.src = ev.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                canvas.width = 300; canvas.height = 300;
                                ctx.drawImage(img, 0, 0, 300, 300);
                                const base64 = canvas.toDataURL('image/jpeg', 0.7);
                                preview.src = base64;
                                preview.setAttribute('data-base64', base64);
                            }
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    };
                },
                preConfirm: () => {
                    const sekolah = document.getElementById('inp-sekolah').value;
                    const hp = document.getElementById('inp-hp').value;
                    const foto = document.getElementById('preview-foto').getAttribute('data-base64') || localUser.foto_url;
                    if (!sekolah || !hp || !foto) return Swal.showValidationMessage('Mohon isi semua data!');
                    return { sekolah, hp, foto_url: foto };
                }
            }).then(result => {
                if (result.isConfirmed) saveProfile(result.value);
            });
        }

        async function saveProfile(data) {
            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            
            // FIX: Mengirim sebagai JSON string untuk menghindari limit URL
            const payload = JSON.stringify({
                action: 'update_profile',
                username: localUser.username,
                sekolah: data.sekolah,
                hp: data.hp,
                foto_url: data.foto_url
            });

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: payload 
                });

                // Update lokal
                localUser = { ...localUser, ...data };
                localStorage.setItem('userPhiQu', JSON.stringify(localUser));
                
                Swal.fire('Berhasil!', 'Profil Anda telah diperbarui.', 'success').then(() => {
                    location.reload();
                });
            } catch (e) {
                Swal.fire('Gagal', 'Terjadi kesalahan koneksi.', 'error');
            }
        }
