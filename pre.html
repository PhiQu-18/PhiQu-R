        function showQuestion() {
            const q = questions[currentIdx];
            
            // UI Updates
            document.getElementById('q-count').innerText = `${currentIdx + 1}/${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('q-masalah').innerText = q.masalah;
            document.getElementById('pilar-tag').innerText = q.pilar;
            document.getElementById('q-image').src = q.image;
            document.getElementById('q-text').innerText = q.text;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = "option-card glass p-4 rounded-2xl flex items-center gap-4 animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.id = `opt-${index}`;
                btn.innerHTML = `
                    <div class="option-label w-10 h-10 rounded-xl bg-white flex items-center justify-center font-bold text-blue-600 shadow-sm transition">
                        ${String.fromCharCode(65 + index)}
                    </div>
                    <span class="text-slate-700 font-bold text-sm leading-tight">${opt}</span>
                `;
                btn.onclick = () => handleAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(choice) {
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-card');
            
            // Disable all options
            allOptions.forEach(card => card.classList.add('disabled'));

            // Menunjukkan jawaban benar/salah
            const selectedBtn = document.getElementById(`opt-${choice}`);
            const correctBtn = document.getElementById(`opt-${q.correct}`);

            if(choice === q.correct) {
                selectedBtn.classList.add('correct');
                const pilarKey = q.pilar.toLowerCase();
                report[pilarKey] += 1;
                report.total_score += 5;
            } else {
                selectedBtn.classList.add('wrong');
                correctBtn.classList.add('correct'); // Tunjukkan yang benarnya
            }

            // Jeda sebentar sebelum pindah
            setTimeout(() => {
                if(currentIdx < questions.length - 1) {
                    currentIdx++;
                    const card = document.getElementById('question-card');
                    card.classList.remove('animate__fadeIn');
                    card.classList.add('animate__fadeOutLeft');
                    
                    setTimeout(() => {
                        card.classList.remove('animate__fadeOutLeft');
                        card.classList.add('animate__fadeInRight');
                        showQuestion();
                    }, 400);
                } else {
                    finishTest();
                }
            }, 1500); // 1.5 detik jeda feedback
        }

async function finishTest() {
            // Tampilkan loading agar user tahu data sedang dikirim
            Swal.fire({
                title: 'Menyimpan Hasil...',
                html: 'Mohon tunggu sebentar...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            const currentUser = JSON.parse(localStorage.getItem('userPhiQu'));
            const currentAttempts = localStorage.getItem('phiQu_pre_attempts') || "1";

            const payload = {
                action: 'submit_pretest',
                username: currentUser.username,
                nilai_fisika: report.total_score,
                dekomposisi: Math.round((report.dekomposisi / 5) * 100),
                pola: Math.round((report.pola / 5) * 100),
                abstraksi: Math.round((report.abstraksi / 5) * 100),
                algoritma: Math.round((report.algoritma / 5) * 100),
                percobaan: currentAttempts
            };

            try {
                // Menggunakan fetch dengan mode 'no-cors' untuk Apps Script
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Jika sukses (karena no-cors tidak bisa baca respon, kita asumsikan sukses jika tidak masuk ke catch)
                setTimeout(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Pre-Test Selesai!',
                        text: 'Hasil berhasil disimpan. Mari lanjut ke materi.',
                        confirmButtonText: 'Lanjut ke Materi',
                        allowOutsideClick: false
                    }).then(() => {
                        window.location.href = "./materi/cover.html"; // ARAHKAN KE MATERI
                    });
                }, 1000);

            } catch (e) {
                console.error("Error submit:", e);
                Swal.fire({
                    icon: 'error',
                    title: 'Gagal Mengirim Data',
                    text: 'Terjadi kesalahan server. Silakan hubungi admin atau cek profil Anda.',
                    confirmButtonText: 'Kembali ke Profil'
                }).then(() => {
                    window.location.href = "profile.html"; // ARAHKAN KE PROFIL JIKA GAGAL
                });
            }
        }

        window.onload = () => {
    if(!localUser) { window.location.href = "materi.html"; return; }

    // --- LOGIKA PENAMBAHAN PERCOBAAN ---
    let attempts = parseInt(localStorage.getItem('phiQu_pre_attempts')) || 0;
    attempts++; // Tambah 1 setiap kali masuk ke halaman pre-test
    localStorage.setItem('phiQu_pre_attempts', attempts);
    // -----------------------------------

    showQuestion();
};
